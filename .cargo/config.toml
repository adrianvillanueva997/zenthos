[build]
# default target stays native for apps/
# firmware crates override this in their own .cargo/config.toml

[target.thumbv6m-none-eabi] # RP2040
runner = "probe-rs run --chip RP2040"
rustflags = ["-C", "link-arg=-Tlink.x", "-C", "link-arg=--nmagic"]

[target.riscv32imc-unknown-none-elf] # ESP32-C6 (RISC-V)
runner = "espflash flash --monitor"

[target.xtensa-esp32s3-none-elf] # ESP32-S3
runner = "espflash flash --monitor"

# cross-compilation for Linux SBCs
[target.aarch64-unknown-linux-gnu] # Luckfox (ARM64)
linker = "aarch64-linux-gnu-gcc"

[target.riscv64gc-unknown-linux-gnu] # LicheeRV Nano (RISC-V Linux)
linker = "riscv64-linux-gnu-gcc"
